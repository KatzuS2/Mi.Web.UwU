
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cyberpunk UwU v.6.0</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<canvas id="bgCanvas"></canvas>

<div class="music-bar-pro">
  <div class="player-left">
    <div class="track-info">
      <div class="main-title">NEON DREAMS</div>
      <div class="sub-title">KAWAII ★ STARS</div>
    </div>
  </div>
  
  <div class="player-center">
    <button class="nav-btn">⏮</button>
    <button id="playBtn" class="play-main">▶</button>
    <button id="pauseBtn" class="play-main" style="display:none;">⏸</button>
    <button class="nav-btn">⏭</button>
  </div>
  
  <div class="player-right">
    <select id="radioSelect" onchange="changeRadio()">
      <option value="">📻 RADIO ANIME</option>
      <option value="https://stream.zeno.fm/7q8hn6vt9mruv">Anime Hits</option>
    </select>
    <div class="time-box">
      <span id="currentTime">00:00</span>
      <div id="progressBar"><div id="progress"></div></div>
      <span id="timeLeft">-00:00</span>
    </div>
  </div>
</div>

<div class="search-section">
  <input type="text" id="audioURL" placeholder="Busca tu música aquí... 🔍">
  <button onclick="loadAudio()">CARGAR</button>
</div>

<h1 class="title">UwU 💖</h1>

<div class="ai-chat">
    <div class="chat-header">🌸 NEURAL LINK (Habla con el Zorro)</div>
    <div class="chat-body" id="chatBody"></div>
    <div class="chat-input">
      <input type="text" id="userInput" placeholder="Pregúntale algo al zorrito..." onkeypress="handleKeyPress(event)">
      <button onclick="sendMessage()">ENVIAR</button>
    </div>
</div>

<div class="hacker-marquee">
    <div class="marquee-content" id="techTrack">
        </div>
</div>

<script src="script.js"></script>
<script src="pet.js"></script>
</body>
</html>
