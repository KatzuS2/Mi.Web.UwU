<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UwU 💖</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<canvas id="bgCanvas"></canvas>

<div class="music-bar">
  <input type="text" id="audioURL" placeholder="Escribe una canción o pega link 🎵">
  <button onclick="loadAudio()">🔍 Buscar/Cargar</button>
  <button id="playBtn">▶️</button>
  <button id="pauseBtn">⏸️</button>
  <select id="radioCategory" onchange="updateRadioList()">
    <option value="">Categoría Radio</option>
    <option value="anime">Anime</option>
    <option value="pop">Pop</option>
    <option value="rock">Rock</option>
  </select>
  <select id="radioSelect" onchange="changeRadio()">
    <option value="">Seleccione Radio</option>
  </select>
  <div id="progressBar"><div id="progress"></div></div>
  <audio id="audio"></audio>
  <div id="youtubeContainer"></div>
</div>

<div class="title-container">
    <h1 class="title">UwU 💖</h1>
    <div class="sparkles"></div>
</div>

<div class="layout">
  <div class="ai-chat">
    <div class="chat-header">🌸 AI Assistant</div>
    <div class="chat-body" id="chatBody"></div>
    <div class="chat-input">
      <input type="text" id="userInput" placeholder="Pregúntame algo...">
      <button onclick="sendMessage()">Enviar</button>
    </div>
  </div>

  <div class="tamagotchi">
    <div class="pet" id="pet">😊</div>
  </div>

  <div class="horoscope">
    <div class="horoscope-header">🪐 Horóscopos</div>
    <div class="horoscope-body" id="horoscopeBody"></div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
