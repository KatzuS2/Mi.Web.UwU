<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Katy Ultimate Kawaii Universe 💖</title>

<style>
body{
margin:0;
font-family:'Comic Sans MS',cursive;
background:#c8f1ff;
overflow:hidden;
}

/* TITULO */
.title{
position:absolute;
top:20px;
width:100%;
text-align:center;
font-size:120px;
color:#ff4fd8;
text-shadow:
0 0 10px #ff4fd8,
0 0 20px #ff4fd8,
0 0 40px #ff99ee,
0 0 80px white;
}

/* PLAYER NUBE */
.cloud-player{
position:absolute;
top:20px;
right:20px;
width:300px;
background:white;
border-radius:50px;
padding:20px;
box-shadow:0 0 30px #aee7ff;
animation:float 4s infinite ease-in-out;
}

@keyframes float{
0%{transform:translateY(0)}
50%{transform:translateY(10px)}
100%{transform:translateY(0)}
}

.bubble{
position:absolute;
bottom:-20px;
width:20px;
height:20px;
background:white;
border-radius:50%;
animation:rise 6s infinite;
}

@keyframes rise{
from{transform:translateY(0);opacity:1;}
to{transform:translateY(-200px);opacity:0;}
}

/* ASISTENTE */
.assistant{
position:absolute;
bottom:20px;
left:20px;
width:300px;
background:white;
border-radius:25px;
padding:15px;
box-shadow:0 0 20px pink;
}

/* MASCOTA */
.pet-game{
position:absolute;
bottom:20px;
right:20px;
width:300px;
background:white;
border-radius:25px;
padding:15px;
box-shadow:0 0 20px #ffb3ec;
}

button{
border:none;
border-radius:15px;
padding:5px 10px;
background:#ffb3ec;
margin:3px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="title">UwU</div>

<!-- REPRODUCTOR -->
<div class="cloud-player">
<h3>☁️ Kawaii Music</h3>

<input id="ytlink" placeholder="Pega link YouTube embed" style="width:100%">
<button onclick="loadYT()">Reproducir</button>

<br><br>

<audio controls id="radio">
<source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3">
</audio>

<div class="bubble" style="left:50px;animation-duration:4s"></div>
<div class="bubble" style="left:100px;animation-duration:6s"></div>

<div id="ytplayer"></div>
</div>

<!-- ASISTENTE GATITO -->
<div class="assistant">
<h3>🐱 Gatito IA</h3>
<div id="chat"></div>
<input id="userinput" placeholder="Preguntame algo~" style="width:100%">
<button onclick="talk()">Enviar</button>
</div>

<!-- JUEGO MASCOTA -->
<div class="pet-game">
<h3>🐶 Mi Mascota</h3>
<div id="petstatus"></div>
<button onclick="feed()">Dar comida</button>
<button onclick="play()">Jugar</button>
<button onclick="save()">Guardar</button>
</div>

<script>

/* YOUTUBE */
function loadYT(){
let link=document.getElementById("ytlink").value;
if(link.includes("watch?v=")){
let id=link.split("watch?v=")[1];
document.getElementById("ytplayer").innerHTML=
`<iframe width="280" height="160"
src="https://www.youtube.com/embed/${id}"
frameborder="0" allowfullscreen></iframe>`;
}
}

/* ASISTENTE SIMPLE */
let name=localStorage.getItem("katyname") || "";

function talk(){
let input=document.getElementById("userinput").value;
let chat=document.getElementById("chat");

if(input.toLowerCase().includes("nombre")){
name=input.split(" ").pop();
localStorage.setItem("katyname",name);
chat.innerHTML+="<p>🐱 Te recordaré, "+name+" 💖</p>";
return;
}

if(input.toLowerCase().includes("horoscopo")){
chat.innerHTML+="<p>🐱 Hoy tendrás energía positiva y amor pastel 💕</p>";
return;
}

let frases=[
"Eres brillante como una estrella ✨",
"Confía en ti 💖",
"Hoy es un día mágico 🌸"
];

chat.innerHTML+="<p>🐱 "+frases[Math.floor(Math.random()*frases.length)]+"</p>";
}

/* MASCOTA */
let pet={
hunger:50,
happiness:50
};

function update(){
document.getElementById("petstatus").innerHTML=
"🍖 Hambre: "+pet.hunger+"<br>🎾 Felicidad: "+pet.happiness;
}
function feed(){
pet.hunger+=10;
update();
}
function play(){
pet.happiness+=10;
update();
}
function save(){
localStorage.setItem("pet",JSON.stringify(pet));
alert("Guardado 💾");
}

let saved=localStorage.getItem("pet");
if(saved){pet=JSON.parse(saved);}
update();

</script>

</body>
</html>
