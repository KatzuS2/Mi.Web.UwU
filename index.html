
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cyberpunk UwU v.4.0 💖</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<canvas id="bgCanvas"></canvas>

<div class="music-bar">
  <div class="input-wrapper">
    <input type="text" id="audioURL" placeholder="YT Link o Canción 💾">
    <button class="glow-btn" onclick="loadAudio()">📡 CARGAR</button>
  </div>
  <div class="media-controls">
    <button id="playBtn" class="icon-btn">▶</button>
    <button id="pauseBtn" class="icon-btn">⏸</button>
  </div>
  <div class="radio-section">
    <select id="radioCategory" onchange="updateRadioList()">
      <option value="">📻 RADIO</option>
      <option value="anime">ANIME</option>
      <option value="lofi">LOFI</option>
    </select>
    <select id="radioSelect" onchange="changeRadio()">
      <option value="">ESTACIÓN</option>
    </select>
  </div>
  <div id="progressBar"><div id="progress"></div></div>
  <audio id="audio" crossorigin="anonymous"></audio>
</div>

<div class="uwu-container">
    <h1 class="title">UwU 💖</h1>
    <div class="sparkles">✨</div>
</div>

<div class="ai-chat" id="chatWindow">
    <div class="chat-header">🌸 NEURAL LINK v.4.0</div>
    <div class="chat-body" id="chatBody"></div>
    <div class="chat-input">
      <input type="text" id="userInput" placeholder="Sincronizar pregunta...">
      <button onclick="sendMessage()">ENVIAR</button>
    </div>
</div>

<div class="tech-slider">
    <div id="techTrack" class="tech-track">
        </div>
</div>

<script src="script.js"></script>
<script src="pet.js"></script>
</body>
</html>
