<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Cyberfox: Neon Flow v8.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Audiowide&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="binaryBg" class="binary-eva-bg"></div>

    <header class="neon-player-top">
        <div class="player-wrapper">
            <div class="controls-group">
                <button class="player-btn"><span>⏮</span></button>
                <button onclick="playMusic()" class="player-btn execute-btn">
                    <span class="btn-text">EXECUTE</span>
                    <span class="bolt">⚡</span>
                </button>
                <button class="player-btn"><span>⏭</span></button>
            </div>
            
            <div class="search-bar-wrap">
                <input type="text" id="ytLink" placeholder="DROP YOUTUBE LINK OR ID HERE...">
            </div>

            <div class="stats-group">
                <div class="visualizer-container" id="v-bars">
                    <div class="v-bar"></div><div class="v-bar"></div><div class="v-bar"></div>
                    <div class="v-bar"></div><div class="v-bar"></div><div class="v-bar"></div>
                    <div class="v-bar"></div><div class="v-bar"></div><div class="v-bar"></div>
                </div>
                <div class="progress-wrapper">
                    <div id="pBar" class="p-fill"></div>
                    <div class="p-bg"></div>
                </div>
                <span id="timer" class="time-code">SYSTEM_READY</span>
            </div>
        </div>
    </header>

    <div class="center-stage">
        <div class="breathe-wrap">
            <span class="uwu-cool">UwU</span>
            <div class="heart-emoji-container">
                <span class="heart-main">💖</span>
                <div class="sparkle s1"></div>
                <div class="sparkle s2"></div>
            </div>
        </div>
    </div>

    <div id="pet" class="cyber-fox">
        <div class="ears"><div class="e"></div><div class="e"></div></div>
        <div class="eyes"><div class="eye"></div><div class="eye"></div></div>
    </div>

    <div class="chat-fixed">
        <div class="chat-head">IA SYSTEM: CYBERFOX_COMM</div>
        <div id="videoContainer" class="v-frame"></div>
        <div id="chatDisplay" class="c-logs"></div>
        <div class="c-input">
            <input type="text" id="userInput" placeholder="Escribe comando...">
            <div class="c-btns">
                <button onclick="askWiki()" class="b-wiki">WIKI SEARCH</button>
                <button onclick="talkToFox()" class="b-fox">TALK TO FOX</button>
            </div>
        </div>
    </div>

    <footer class="tech-marquee">
        <div class="marquee-content" id="iconTrack"></div>
    </footer>

    <script src="script.js"></script>
    <script src="pet.js"></script>
</body>
</html>
