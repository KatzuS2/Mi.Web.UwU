<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Cyberfox UwU - God Mode</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="glass-bg">
        <div class="uwu-glow">
            <span class="text-uwu">UwU</span>
            <div class="heart-neon"></div>
            <div class="stars-bg"></div>
        </div>
    </div>

    <header class="top-player">
        <div class="player-content">
            <div class="song-info">
                <span class="main-title">NEON</span>
                <span class="sub-title">KAWAII ★ STARS</span>
            </div>
            <div class="audio-visualizer">
                <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
            </div>
            <div class="main-controls">
                <button class="btn-step">⏮</button>
                <button id="playBtn" class="btn-play">▶</button>
                <button class="btn-step">⏭</button>
            </div>
            <div class="extra-info">
                <div class="badge-radio">📡 RADIO</div>
                <div id="clock" class="digital-clock">10:23 AM</div>
            </div>
        </div>
    </header>

    <div id="pet" class="cyber-pet">
        <div class="ears">
            <div class="ear-l"></div><div class="ear-r"></div>
        </div>
        <div class="face">
            <div class="eyes"><div class="eye"></div><div class="eye"></div></div>
            <div class="blush"></div>
        </div>
    </div>

    <div class="ai-chat-box">
        <div class="chat-header">IA DE CYBERFOX UWU</div>
        <div id="chatDisplay" class="chat-display"></div>
        <div class="chat-input-area">
            <input type="text" id="userInput" placeholder="Busca en Wikipedia..." onkeypress="if(event.key==='Enter') sendToIA()">
            <button onclick="sendToIA()">SEND</button>
        </div>
    </div>

    <footer class="tech-footer">
        <div class="marquee" id="marquee"></div>
    </footer>

    <script src="script.js"></script>
    <script src="pet.js"></script>
</body>
</html>
