
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kawaii Neon World UwU 💖</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<canvas id="bgCanvas"></canvas>
<canvas id="trailCanvas"></canvas> <div class="music-bar">
  <div class="search-group">
    <input type="text" id="audioURL" placeholder="Escribe canción o artista... 🎵">
    <button class="btn-neon" onclick="searchAndPlay()">🔍 Buscar y Reproducir</button>
  </div>
  <div class="controls">
    <button class="btn-ctrl" id="playBtn">▶️</button>
    <button class="btn-ctrl" id="pauseBtn">⏸️</button>
  </div>
  <div class="radio-group">
    <select id="radioCategory" onchange="updateRadioList()">
      <option value="">📻 Género Radio</option>
      <option value="anime">Anime Hits</option>
    </select>
    <select id="radioSelect" onchange="changeRadio()">
      <option value="">Selecciona emisora</option>
    </select>
  </div>
  <div id="progressBar"><div id="progress"></div></div>
  <audio id="audio" crossorigin="anonymous"></audio>
</div>

<div class="uwu-system-container">
    <div class="sparkle-effect"></div>
    <div id="uwuPlanet" class="uwu-planet">
        <h1 class="title">UwU</h1>
    </div>
    <div id="horoscopeOrbit" class="horoscope-orbit">
        </div>
</div>

<div class="main-content">
  <div class="ai-chat">
    <div class="chat-header">🌸 NEURAL NYAN-TERFACE UwU</div>
    <div class="chat-body" id="chatBody">
        <div class="msg ai">¡Hola! Soy tu asistente Nyan-tástica. ¡Pregúntame lo que quieras! 🐾</div>
    </div>
    <div class="chat-input">
      <input type="text" id="userInput" placeholder="Escribe tu pregunta nyan...">
      <button class="btn-kawaii" onclick="sendMessage()">Enviar ✨</button>
    </div>
  </div>
</div>

<div class="kitty-pet" id="kittyPet">
    <div class="kitty-sprite">🐈</div>
</div>

<div id="youtubeContainer" class="yt-hidden"></div>

<script src="script.js"></script>
</body>
</html>
