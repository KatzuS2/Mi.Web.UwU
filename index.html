
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyberpunk UwU 💖</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<canvas id="bgCanvas"></canvas>

<div class="music-bar">
  <div class="input-wrapper">
    <input type="text" id="audioURL" placeholder="Inserta Link (YT/MP3/Stream) 💾">
    <button class="glow-btn" onclick="loadAudio()">📡 CARGAR</button>
  </div>
  <div class="media-controls">
    <button id="playBtn" class="icon-btn">▶</button>
    <button id="pauseBtn" class="icon-btn">⏸</button>
  </div>
  <div class="radio-section">
    <select id="radioCategory" onchange="updateRadioList()">
      <option value="">📟 GÉNERO</option>
      <option value="anime">ANIME</option>
      <option value="retro">RETRO</option>
    </select>
    <select id="radioSelect" onchange="changeRadio()">
      <option value="">EMISORA</option>
    </select>
  </div>
  <div id="progressBar"><div id="progress"></div></div>
  <audio id="audio"></audio>
</div>

<div class="uwu-container">
    <h1 class="title">UwU 💖</h1>
    <div class="sparkles">✨</div>
</div>

<div class="ai-chat">
    <div class="chat-header">🌸 NEURAL LINK v.2.0</div>
    <div class="chat-body" id="chatBody"></div>
    <div class="chat-input">
      <input type="text" id="userInput" placeholder="Sincronizar pregunta...">
      <button onclick="sendMessage()">ENVIAR</button>
    </div>
</div>

<div id="pet" class="tamagotchi-pet"></div>

<div class="horoscope-slider">
    <div id="horoscopeBody" class="h-track"></div>
</div>

<div id="youtubeContainer" class="yt-frame"></div>

<script src="script.js"></script>
<script src="pet.js"></script>
</body>
</html>
