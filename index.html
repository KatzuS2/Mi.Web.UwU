
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UwU 💖</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- BURBUJAS -->
<div class="bubbles"></div>

<!-- TITULO -->
<div class="title">UwU</div>

<!-- REPRODUCTOR NUBE -->
<div class="cloud-player">
  <div class="cloud-shape"></div>
  <div class="player-content">
    <h3>☁️ Dream Player</h3>
    <input type="text" id="audioURL" placeholder="Pegá tu link MP3 aquí ✨">
    <button onclick="loadAudio()">Cargar</button>
    <audio id="audio" controls></audio>
    <div class="visualizer"></div>
  </div>
</div>

<!-- CHAT IA -->
<div class="ai-chat">
  <div class="chat-header">🌸 AI Assistant</div>
  <div class="chat-body" id="chatBody"></div>
  <div class="chat-input">
    <input type="text" id="userInput" placeholder="Escribí algo lindo...">
    <button onclick="sendMessage()">Enviar</button>
  </div>
</div>

<!-- TAMAGOTCHI -->
<div class="tamagotchi">
  <div class="pet-screen">
    <div class="pet" id="pet"></div>
  </div>
  <div class="pet-controls">
    <button onclick="feedPet()">🍓</button>
    <button onclick="playPet()">🎮</button>
    <button onclick="sleepPet()">💤</button>
  </div>
</div>

<script>
/* BURBUJAS */
const bubbleContainer = document.querySelector('.bubbles');
for(let i=0;i<25;i++){
  let b = document.createElement("div");
  b.className="bubble";
  b.style.left=Math.random()*100+"vw";
  b.style.animationDuration=(6+Math.random()*6)+"s";
  b.style.width=b.style.height=(40+Math.random()*80)+"px";
  bubbleContainer.appendChild(b);
}

/* AUDIO */
function loadAudio(){
  const url=document.getElementById("audioURL").value;
  document.getElementById("audio").src=url;
}

/* CHAT */
function sendMessage(){
  const input=document.getElementById("userInput");
  const body=document.getElementById("chatBody");
  if(input.value.trim()=="") return;
  body.innerHTML+=`<div class="msg user">${input.value}</div>`;
  setTimeout(()=>{
    body.innerHTML+=`<div class="msg ai">UwU dice: ${input.value} 💖</div>`;
    body.scrollTop=body.scrollHeight;
  },600);
  input.value="";
}

/* TAMAGOTCHI */
let pet=document.getElementById("pet");
let mood=0;

function animatePet(){
  pet.style.transform=`translateX(${Math.sin(Date.now()/500)*10}px)`;
  requestAnimationFrame(animatePet);
}
animatePet();

function feedPet(){ mood+=2; }
function playPet(){ mood+=1; }
function sleepPet(){ mood=0; }
</script>

</body>
</html>
